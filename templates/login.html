<!DOCTYPE html>
<html>
<head>
    <title>Login - Foodoraa</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(to right, #e8f5e9, #f1fff1);
        }

        .box{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            text-align:center;
        }

        h2{
            color:#1B5E20;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:#2E8B57;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            background:#1B5E20;
        }

        a{
            display:block;
            margin-top:10px;
            color:#2E8B57;
            text-decoration:none;
        }
    </style>
</head>

<body>

    <div class="box">

        <h2>Login</h2>

        <form method="POST">

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <a href="/signup">Create new account</a>

    </div>

</body>
</html>
