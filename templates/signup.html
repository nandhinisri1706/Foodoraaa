<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        body{
            font-family:Arial;
            background:linear-gradient(to right, #e8f5e9, #f1fff1);
        }

        .box{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:#2E8B57;
            color:white;
            border:none;
            border-radius:10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Signup</h2>

    <form method="POST">

        <input type="text" name="username" placeholder="Username">

        <input type="password" name="password" placeholder="Password">

        <button type="submit">Signup</button>

    </form>

</div>

</body>
</html>
